name: Build AirPods Controller APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          unset ANDROID_SDK_ROOT
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" || true
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q gradle-8.4-bin.zip
          gradle-8.4/bin/gradle assembleDebug --no-daemon
          echo "=== Finding APK ==="
          find . -name "*.apk" 2>/dev/null
          mkdir -p apk-output
          find . -name "*.apk" -exec cp {} apk-output/ \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AirPodsController-APK
          path: apk-output/
